radarr:
  server:
    base_url: !secret RADARR_ANIME_BASE_URL
    api_key: !secret RADARR_ANIME_API_KEY
    apiroot: /api/v3

  # ──────────────────────────────────────────────
  # CONFIG: settings applied via PUT to /api/v3/config/*
  # ──────────────────────────────────────────────
  config:

    # --- Naming (toggles only — format strings handled by recyclarr) ---
    naming:
      renameMovies: true
      replaceIllegalCharacters: true
      colonReplacementFormat: delete       # delete, dash, spaceDash, spaceDashSpace, smart

    # --- Media Management ---
    mediamanagement:
      autoUnmonitorPreviouslyDownloadedMovies: true
      recycleBin: ""
      recycleBinCleanupDays: 7
      downloadPropersAndRepacks: doNotPrefer  # handled via custom formats in recyclarr
      createEmptyMovieFolders: false
      deleteEmptyFolders: true
      fileDate: none
      rescanAfterRefresh: always
      autoRenameFolders: false
      pathsDefaultStatic: false
      setPermissionsLinux: false
      chmodFolder: "755"
      chownGroup: ""
      skipFreeSpaceCheckWhenImporting: false
      minimumFreeSpaceWhenImporting: 100
      copyUsingHardlinks: true
      useScriptImport: false
      scriptImportPath: ""
      importExtraFiles: false
      extraFileExtensions: srt
      enableMediaInfo: true

    # --- General / Host ---
    host:
      bindAddress: "*"
      port: 7879
      sslPort: 9898
      enableSsl: false
      launchBrowser: false
      authenticationMethod: forms
      authenticationRequired: disabledForLocalAddresses
      analyticsEnabled: false
      logLevel: info
      logSizeLimit: 1
      branch: master
      instanceName: RadarrAnime
      updateAutomatically: true
      updateMechanism: builtIn
      proxyEnabled: false
      proxyType: http
      proxyHostname: ""
      proxyPort: 8080
      proxyUsername: ""
      proxyPassword: ""
      proxyBypassFilter: ""
      proxyBypassLocalAddresses: true
      certificateValidation: enabled
      backupFolder: Backups
      backupInterval: 7
      backupRetention: 28
      trustCgnatIpAddresses: false

  # ──────────────────────────────────────────────
  # ROOT FOLDERS (POST to /api/v3/rootfolder)
  # ──────────────────────────────────────────────
  rootfolder:
    - path: !secret ROOTFOLDER_AUTOANIMEMOVIES

  # ──────────────────────────────────────────────
  # DOWNLOAD CLIENTS (POST to /api/v3/downloadclient)
  # ──────────────────────────────────────────────
  downloadclient:
    - name: qBittorrent
      enable: true
      protocol: torrent
      priority: 1
      removeCompletedDownloads: true
      removeFailedDownloads: true
      implementation: QBittorrent
      configContract: QBittorrentSettings
      fields:
        - name: host
          value: !secret QBITTORRENT_ADDRESS
        - name: port
          value: !secret QBITTORRENT_PORT
        - name: useSsl
          value: false
        - name: username
          value: !secret QBITTORRENT_USERNAME
        - name: password
          value: !secret QBITTORRENT_PASSWORD   # masked by Radarr API — fill in manually
        - name: movieCategory
          value: movies-radarr
        - name: recentMoviePriority
          value: 0                           # 0=Last, 1=First
        - name: olderMoviePriority
          value: 0
        - name: initialState
          value: 0                           # 0=Started, 1=Force Started, 2=Stopped
        - name: sequentialOrder
          value: true
        - name: firstAndLast
          value: true
        - name: contentLayout
          value: 0                           # 0=Default, 1=Original, 2=Subfolder

  # ──────────────────────────────────────────────
  # INDEXERS — handled by Prowlarr sync (see prowlarr section below)
  # Prowlarr will auto-sync Nyaa.si to this Radarr instance
  # via the RadarrAnime application + "anime" tag
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # CONNECTIONS / NOTIFICATIONS (POST to /api/v3/notification)
  # ──────────────────────────────────────────────
  notification:
    - name: Jellyfin Webhook
      onGrab: false
      onDownload: true
      onUpgrade: true
      onRename: false
      onMovieAdded: false
      onMovieDelete: false
      onMovieFileDelete: true
      onMovieFileDeleteForUpgrade: true
      onHealthIssue: false
      includeHealthWarnings: false
      onHealthRestored: false
      onApplicationUpdate: false
      onManualInteractionRequired: false
      implementation: Webhook
      configContract: WebhookSettings
      fields:
        - name: url
          value: !secret JELLYFIN_LIBRARY_SCANNER_BASE_URL
        - name: method
          value: 1                           # 1=POST, 2=PUT
      tags: []

    - name: ServarrForceImporter
      onGrab: false
      onDownload: false
      onUpgrade: false
      onRename: false
      onMovieAdded: false
      onMovieDelete: false
      onMovieFileDelete: false
      onMovieFileDeleteForUpgrade: false
      onHealthIssue: false
      includeHealthWarnings: false
      onHealthRestored: false
      onApplicationUpdate: false
      onManualInteractionRequired: true
      implementation: Webhook
      configContract: WebhookSettings
      fields:
        - name: url
          value: !secret SERVARR_FORCE_IMPORTER_BASE_URL
        - name: method
          value: 1                           # 1=POST, 2=PUT
      tags: []

# ════════════════════════════════════════════════
# PROWLARR: ensure RadarrAnime application exists
# so Nyaa.si (tagged "anime") auto-syncs to this Radarr instance
# ════════════════════════════════════════════════
prowlarr:
  server:
    base_url: !secret PROWLARR_BASE_URL
    api_key: !secret PROWLARR_API_KEY
    apiroot: /api/v1

  applications:
    - name: RadarrAnime
      syncLevel: fullSync
      implementation: Radarr
      configContract: RadarrSettings
      fields:
        - name: prowlarrUrl
          value: !secret PROWLARR_BASE_URL
        - name: baseUrl
          value: !secret RADARR_ANIME_BASE_URL
        - name: apiKey
          value: !secret RADARR_ANIME_API_KEY
        - name: syncCategories
          value: [2000, 2060]
        - name: syncAnimeCategories
          value: [2060]
        - name: syncRejectBlocklistedTorrentHashesWhileGrabbing
          value: true
      tags: [3]                              # tag 3 = "anime" — matches Nyaa.si's tag
