sonarr:
  sonarr:
    base_url: !secret SONARR_ANIME_BASE_URL
    api_key: !secret SONARR_ANIME_API_KEY

    # ── Media Naming (TRaSH recommended) ──────────────────────────────
    media_naming:
      series: jellyfin-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    # ── Quality Definition ────────────────────────────────────────────
    quality_definition:
      type: anime

    # ── Quality Profiles ──────────────────────────────────────────────
    quality_profiles:
      - name: REMUX
        upgrade:
          allowed: true
          until_quality: Bluray-2160p Remux
          until_score: 10000
        min_format_score: 100
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        qualities:
          - name: Bluray-2160p Remux
          - name: Bluray-1080p Remux
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - HDTV-1080p
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - HDTV-720p
              - WEBDL-720p
              - WEBRip-720p
          - name: Bluray-576p
          - name: Bluray-480p
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD
          - name: SDTV
          - name: Raw-HD

      - name: WEBDL
        upgrade:
          allowed: true
          until_quality: WEB 2160p
          until_score: 10000
        min_format_score: 100
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p
          - name: WEB 1080p
            qualities:
              - HDTV-1080p
              - WEBDL-1080p
              - WEBRip-1080p
          - name: WEB 720p
            qualities:
              - HDTV-720p
              - WEBDL-720p
              - WEBRip-720p
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: Bluray-2160p Remux
          - name: Bluray-1080p Remux
          - name: Bluray-2160p
          - name: Bluray-1080p
          - name: Bluray-720p
          - name: Bluray-576p
          - name: Bluray-480p
          - name: DVD
          - name: SDTV
          - name: Raw-HD


    # ── Custom Formats ────────────────────────────────────────────────
    delete_old_custom_formats: true

