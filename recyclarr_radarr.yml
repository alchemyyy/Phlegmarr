radarr:
  radarr:
    base_url: !secret RADARR_BASE_URL
    api_key: !secret RADARR_API_KEY

    # ── Media Naming (TRaSH recommended) ──────────────────────────────
    media_naming:
      folder: default
      movie:
        rename: true
        standard: jellyfin-tmdb

    # ── Quality Definition ────────────────────────────────────────────
    quality_definition:
      type: movie

    # ── Quality Profiles ──────────────────────────────────────────────
    quality_profiles:
      # Profile 1: WEBDL — prioritizes WEB-DL/Bluray encodes over Remux
      - name: WEBDL
        upgrade:
          allowed: true
          until_quality: WEB 2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Bluray-2160p
          - name: HDTV-2160p
          - name: Remux-2160p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-1080p
          - name: Remux-1080p
          - name: HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: Raw-HD
          - name: Bluray-576p
          - name: Bluray-480p
          - name: DVD
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD-R
          - name: SDTV
          - name: DVDSCR
          - name: REGIONAL
          - name: TELECINE
          - name: TELESYNC
          - name: CAM
          - name: WORKPRINT

      # Profile 2: REMUX — maximum quality
      - name: REMUX
        upgrade:
          allowed: true
          until_quality: Remux-2160p
          until_score: 10000
        min_format_score: 0
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        qualities:
          - name: Remux-2160p
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p
          - name: Remux-1080p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: Raw-HD
          - name: Bluray-576p
          - name: Bluray-480p
          - name: DVD
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD-R
          - name: SDTV
          - name: DVDSCR
          - name: REGIONAL
          - name: TELECINE
          - name: TELESYNC
          - name: CAM
          - name: WORKPRINT

    # ── Custom Formats ────────────────────────────────────────────────
    delete_old_custom_formats: true

